<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GourmetKeep Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#FAFAFA] text-gray-800 antialiased min-h-screen flex flex-col pb-16 select-none">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-40 shadow-xs h-14 flex items-center justify-between px-4 shrink-0">
        <div class="flex items-center gap-2">
            <div class="bg-orange-500 text-white p-1.5 rounded-lg">
                <i data-lucide="cooking-pot" class="w-5 h-5"></i>
            </div>
            <span class="text-lg font-bold tracking-tight bg-gradient-to-r from-orange-500 to-amber-500 bg-clip-text text-transparent">GourmetKeep</span>
        </div>
        <button onclick="copiaCodiceSorgente()" class="text-[11px] bg-gray-50 border border-gray-100 px-2.5 py-1 rounded-lg font-medium flex items-center gap-1 text-gray-600">
            <i data-lucide="copy" class="w-3.5 h-3.5"></i> <span id="btn-copy-text">Copia</span>
        </button>
    </header>

    <main class="flex-1 w-full max-w-md mx-auto p-4 space-y-4 overflow-x-hidden">
        
        <div id="section-home" class="space-y-4">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                <input type="text" id="search-input" oninput="filterRecipes()" placeholder="Cerca ricetta o ingrediente..." class="w-full pl-9 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:outline-none focus:border-orange-500 text-sm shadow-xs">
            </div>

            <div class="flex gap-2 overflow-x-auto no-scrollbar py-1 shrink-0">
                <button onclick="setCategoryFilter('')" id="cat-all" class="cat-btn px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition bg-orange-500 text-white shadow-xs">Tutti</button>
                <button onclick="setCategoryFilter('antipasto')" id="cat-antipasto" class="cat-btn px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition bg-white text-gray-600 border border-gray-200">Antipasti</button>
                <button onclick="setCategoryFilter('primo')" id="cat-primo" class="cat-btn px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition bg-white text-gray-600 border border-gray-200">Primi</button>
                <button onclick="setCategoryFilter('secondo')" id="cat-secondo" class="cat-btn px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition bg-white text-gray-600 border border-gray-200">Secondi</button>
                <button onclick="setCategoryFilter('dolce')" id="cat-dolce" class="cat-btn px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition bg-white text-gray-600 border border-gray-200">Dolci</button>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                    <h3 class="font-bold text-gray-400 text-xs uppercase tracking-wider">Ricette (<span id="recipe-count">0</span>)</h3>
                </div>
                <div id="recipes-container" class="space-y-2.5"></div>
            </div>
        </div>

        <div id="section-filters" class="hidden bg-white p-5 rounded-2xl border border-gray-100 shadow-xs space-y-4">
            <h3 class="font-bold text-gray-900 text-sm flex items-center gap-2"><i data-lucide="sliders-horizontal" class="text-orange-500 w-4 h-4"></i> Filtri Avanzati</h3>
            <div>
                <label class="block text-[11px] font-semibold uppercase text-gray-400 mb-1.5">Tempo Massimo Preparazione</label>
                <select id="filter-time" onchange="filterRecipes()" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none">
                    <option value="">Qualsiasi tempistica</option>
                    <option value="15">Fino a 15 minuti</option>
                    <option value="30">Fino a 30 minuti</option>
                    <option value="60">Fino a 1 ora</option>
                </select>
            </div>
        </div>

        <div id="section-backup" class="hidden bg-white p-5 rounded-2xl border border-gray-100 shadow-xs space-y-4">
            <h3 class="font-bold text-gray-900 text-sm flex items-center gap-2"><i data-lucide="database" class="text-orange-500 w-4 h-4"></i> Backup & Sincronizzazione</h3>
            <p class="text-xs text-gray-500 leading-relaxed">Esporta o importa le tue ricette per non perderle.</p>
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button onclick="triggerImport()" class="bg-gray-50 border border-gray-200 text-gray-700 py-3 rounded-xl font-medium text-xs flex flex-col items-center justify-center gap-1.5 active:bg-gray-100 transition">
                    <i data-lucide="download" class="w-5 h-5 text-gray-500"></i> Importa File
                </button>
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(event)">
                
                <button onclick="exportData()" class="bg-gray-50 border border-gray-200 text-gray-700 py-3 rounded-xl font-medium text-xs flex flex-col items-center justify-center gap-1.5 active:bg-gray-100 transition">
                    <i data-lucide="upload" class="w-5 h-5 text-gray-500"></i> Esporta File
                </button>
            </div>
        </div>
    </main>

    <div id="detail-overlay" class="fixed inset-0 bg-white z-50 hidden flex-col overflow-y-auto pb-6">
        <div id="detail-image" class="h-56 w-full bg-cover bg-center relative shrink-0">
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div>
            <button onclick="closeRecipeDetail()" class="absolute top-4 left-4 bg-white/95 text-gray-800 p-2 rounded-xl shadow-md active:scale-95 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            
            <div class="absolute top-4 right-4 flex gap-2">
                <button onclick="openEditModal()" class="bg-white/95 text-orange-600 p-2 rounded-xl shadow-md active:scale-95 transition" title="Modifica ricetta">
                    <i data-lucide="pencil" class="w-5 h-5"></i>
                </button>
                <button onclick="deleteRecipe()" class="bg-white/95 text-red-600 p-2 rounded-xl shadow-md active:scale-95 transition" title="Elimina ricetta">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="absolute bottom-4 left-4 right-4 text-white">
                <span id="detail-category" class="bg-orange-500 text-white text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-md">Categoria</span>
                <h2 id="detail-title" class="text-xl font-bold mt-1 leading-tight">Titolo</h2>
                <div class="flex gap-2 text-xs text-gray-200 mt-1.5 items-center">
                    <i data-lucide="clock" class="w-3.5 h-3.5"></i> <span id="detail-time">0</span> min
                </div>
            </div>
        </div>

        <div class="p-4 space-y-5">
            <div class="bg-orange-50/80 border border-orange-100 p-4 rounded-xl space-y-2">
                <h4 class="text-xs font-bold text-orange-800 uppercase tracking-wide flex items-center gap-1">
                    <i data-lucide="scale" class="w-3.5 h-3.5"></i> Bilanciatore Proporzioni
                </h4>
                <div class="grid grid-cols-1 gap-2">
                    <select id="calc-ingrediente" class="w-full bg-white border border-gray-200 rounded-lg p-2 text-xs focus:outline-none"></select>
                    <div class="flex gap-2">
                        <input type="number" id="calc-valore" placeholder="Quantità desiderata" class="w-full bg-white border border-gray-200 rounded-lg p-2 text-xs focus:outline-none">
                        <button onclick="calcolaProporzioni()" class="bg-orange-500 text-white px-4 rounded-lg text-xs font-semibold shrink-0 active:bg-orange-600">Calcola</button>
                    </div>
                </div>
                <button onclick="resetDettaglioIngredienti()" class="text-[10px] text-gray-500 underline block text-right w-full">Ripristina dosi originali</button>
            </div>

            <div class="space-y-2">
                <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Ingredienti</h4>
                <ul id="detail-ingredients-list" class="bg-gray-50 rounded-xl p-3 space-y-2 divide-y divide-gray-200/50"></ul>
            </div>

            <div class="space-y-3">
                <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Preparazione</h4>
                <div id="detail-steps-list" class="space-y-4 pl-1"></div>
            </div>
        </div>
    </div>

    <button id="floating-add-btn" onclick="openCreateModal()" class="fixed bottom-20 right-4 bg-orange-500 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center z-30 active:scale-95 transition-transform" title="Nuova Ricetta">
        <i data-lucide="plus" class="w-5 h-5"></i>
    </button>

    <nav class="fixed bottom-0 left-0 right-0 h-16 bg-white border-t border-gray-100 flex items-center justify-around z-40 px-2 max-w-md mx-auto shadow-md">
        <button onclick="switchTab('home')" id="tab-home" class="flex flex-col items-center justify-center text-orange-500 font-medium text-[10px] gap-0.5 flex-1">
            <i data-lucide="book-marked" class="w-5 h-5"></i>Ricettario
        </button>
        <button onclick="switchTab('filters')" id="tab-filters" class="flex flex-col items-center justify-center text-gray-400 font-medium text-[10px] gap-0.5 flex-1">
            <i data-lucide="sliders" class="w-5 h-5"></i>Filtri Avanzati
        </button>
        <button onclick="switchTab('backup')" id="tab-backup" class="flex flex-col items-center justify-center text-gray-400 font-medium text-[10px] gap-0.5 flex-1">
            <i data-lucide="database" class="w-5 h-5"></i>Backup
        </button>
    </nav>

    <div id="recipe-modal" class="fixed inset-0 bg-white z-50 hidden flex-col overflow-y-auto">
        <div class="p-4 border-b border-gray-100 flex items-center justify-between shrink-0">
            <h3 id="modal-title-text" class="font-bold text-gray-900 text-base">Nuova Ricetta</h3>
            <button type="button" onclick="closeModal()" class="text-gray-400 p-1"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        
        <form id="recipe-form" onsubmit="saveRecipe(event)" class="p-4 space-y-4 flex-1 text-xs pb-12">
            <input type="hidden" id="form-recipe-id" value="">

            <div>
                <label class="block font-semibold text-gray-600 mb-1">Nome Ricetta *</label>
                <input type="text" id="form-title" required placeholder="Es. Lasagne alla Bolognese" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-orange-500">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block font-semibold text-gray-600 mb-1">Categoria *</label>
                    <select id="form-category" required class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none bg-white">
                        <option value="antipasto">Antipasto</option>
                        <option value="primo" selected>Primo</option>
                        <option value="secondo">Secondo</option>
                        <option value="dolce">Dolce</option>
                    </select>
                </div>
                <div>
                    <label class="block font-semibold text-gray-600 mb-1">Tempo (minuti) *</label>
                    <input type="number" id="form-time" required min="1" placeholder="30" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none">
                </div>
            </div>

            <div>
                <label class="block font-semibold text-gray-600 mb-1">Link Foto Copertina (opzionale)</label>
                <input type="url" id="form-image" placeholder="https://..." class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none">
            </div>

            <div class="border-t border-gray-100 pt-4 space-y-2">
                <div class="flex items-center justify-between">
                    <h4 class="font-bold text-gray-900 text-sm">Ingredienti *</h4>
                    <button type="button" onclick="addIngredientRow()" class="text-orange-500 font-medium flex items-center gap-1 text-xs">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> Aggiungi riga
                    </button>
                </div>
                <div id="form-ingredients-container" class="space-y-2"></div>
            </div>

            <div class="border-t border-gray-100 pt-4 space-y-2">
                <div class="flex items-center justify-between">
                    <h4 class="font-bold text-gray-900 text-sm">Passaggi Preparazione *</h4>
                    <button type="button" onclick="addStepRow()" class="text-orange-500 font-medium flex items-center gap-1 text-xs">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> Aggiungi passaggio
                    </button>
                </div>
                <div id="form-steps-container" class="space-y-2"></div>
            </div>

            <div class="pt-4 flex gap-2">
                <button type="submit" class="w-full py-3 bg-orange-500 text-white rounded-xl text-sm font-bold shadow-xs active:bg-orange-600">Salva nel Ricettario</button>
            </div>
        </form>
    </div>

    <script>
        const ricetteDemo = [
            {
                id: "demo-1",
                title: "Bowl di Salmone e Avocado",
                category: "primo",
                time: 20,
                image: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=600",
                ingredients: [
                    { nome: "Salmone Fresco (g)", qta: 150 },
                    { nome: "Riso per Sushi (g)", qta: 100 },
                    { nome: "Avocado (pz)", qta: 0.5 }
                ],
                steps: [
                    "Sciacqua accuratamente il riso per sushi e cuocilo.",
                    "Taglia il salmone fresco e l'avocado a cubetti uniformi.",
                    "Disponi gli elementi nella ciotola e servi freschi."
                ]
            }
        ];

        let databaseRicette = [];
        let idRicettaAttiva = null;
        let filtroCategoriaAttivo = '';
        let ingredientiModificatiConvertitore = []; 

        function initApp() {
            try {
                const locale = localStorage.getItem('gourmet_keep_mobile_data');
                if (locale) {
                    databaseRicette = JSON.parse(locale);
                } else {
                    databaseRicette = ricetteDemo;
                    salvaSuFileLocale();
                }
            } catch (e) {
                databaseRicette = ricetteDemo;
            }
            renderRecipesList(databaseRicette);
            resetForm();
            updateFloatingButtonVisibility();
            if(window.lucide) lucide.createIcons();
        }

        function salvaSuFileLocale() {
            try {
                localStorage.setItem('gourmet_keep_mobile_data', JSON.stringify(databaseRicette));
            } catch(e) { console.error(e); }
        }

        function switchTab(tabName) {
            document.getElementById('section-home').classList.add('hidden');
            document.getElementById('section-filters').classList.add('hidden');
            document.getElementById('section-backup').classList.add('hidden');
            
            document.getElementById('tab-home').className = "flex flex-col items-center justify-center text-gray-400 font-medium text-[10px] gap-0.5 flex-1";
            document.getElementById('tab-filters').className = "flex flex-col items-center justify-center text-gray-400 font-medium text-[10px] gap-0.5 flex-1";
            document.getElementById('tab-backup').className = "flex flex-col items-center justify-center text-gray-400 font-medium text-[10px] gap-0.5 flex-1";

            document.getElementById(`section-${tabName}`).classList.remove('hidden');
            document.getElementById(`tab-${tabName}`).classList.add('text-orange-500');
            document.getElementById(`tab-${tabName}`).classList.remove('text-gray-400');
            
            updateFloatingButtonVisibility();
        }

        function setCategoryFilter(cat) {
            filtroCategoriaAttivo = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = "cat-btn px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition bg-white text-gray-600 border border-gray-200";
            });
            const activeId = cat === '' ? 'cat-all' : `cat-${cat}`;
            document.getElementById(activeId).className = "cat-btn px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition bg-orange-500 text-white shadow-xs";
            renderRecipesList(getFilteredRecipes());
        }

        function updateFloatingButtonVisibility() {
            const btn = document.getElementById('floating-add-btn');
            const isModalOpen = !document.getElementById('recipe-modal').classList.contains('hidden');
            const isDetailOpen = !document.getElementById('detail-overlay').classList.contains('hidden');
            const isHomeActive = !document.getElementById('section-home').classList.contains('hidden');

            if (isModalOpen || isDetailOpen || !isHomeActive) {
                btn.style.display = 'none';
            } else {
                btn.style.display = 'flex';
            }
        }

        function renderRecipesList(recipes) {
            const container = document.getElementById('recipes-container');
            document.getElementById('recipe-count').textContent = recipes.length;
            container.innerHTML = '';

            if (recipes.length === 0) {
                container.innerHTML = `<p class="text-xs text-gray-400 text-center py-8">Nessuna ricetta trovata.</p>`;
                return;
            }

            recipes.forEach(ricetta => {
                const bgImg = ricetta.image || 'https://images.unsplash.com/photo-1495521821757-a1efb6729352?auto=format&fit=crop&q=80&w=400';
                const card = document.createElement('div');
                card.className = "bg-white p-3 rounded-xl border border-gray-100 flex gap-3 items-center active:bg-gray-50 transition shadow-xs";
                card.onclick = () => openRecipeDetail(ricetta.id);
                
                card.innerHTML = `
                    <div class="w-16 h-16 rounded-xl bg-cover bg-center shrink-0 bg-gray-50" style="background-image: url('${bgImg}')"></div>
                    <div class="flex-1 min-w-0">
                        <span class="text-[9px] font-bold text-orange-500 uppercase tracking-wider">${ricetta.category || 'Ricetta'}</span>
                        <h4 class="font-bold text-gray-900 text-sm truncate -mt-0.5">${ricetta.title}</h4>
                        <div class="flex gap-2 items-center text-xs text-gray-400 mt-1">
                            <span class="flex items-center gap-0.5"><i data-lucide="clock" class="w-3 h-3"></i> ${ricetta.time} min</span>
                            <span>•</span>
                            <span>${ricetta.ingredients.length} ingredienti</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            if(window.lucide) lucide.createIcons();
        }

        function openRecipeDetail(id) {
            idRicettaAttiva = id;
            const ricetta = databaseRicette.find(r => r.id === id);
            if (!ricetta) return;

            document.getElementById('detail-overlay').classList.remove('hidden');

            document.getElementById('detail-title').textContent = ricetta.title;
            document.getElementById('detail-category').textContent = ricetta.category || 'Ricetta';
            document.getElementById('detail-time').textContent = ricetta.time;
            document.getElementById('detail-image').style.backgroundImage = `url('${ricetta.image || 'https://images.unsplash.com/photo-1495521821757-a1efb6729352?auto=format&fit=crop&q=80&w=800'}')`;

            ingredientiModificatiConvertitore = JSON.parse(JSON.stringify(ricetta.ingredients));
            
            const calcSelect = document.getElementById('calc-ingrediente');
            calcSelect.innerHTML = '';
            ricetta.ingredients.forEach((ing, index) => {
                const opt = document.createElement('option');
                opt.value = index;
                opt.textContent = ing.nome;
                calcSelect.appendChild(opt);
            });
            document.getElementById('calc-valore').value = '';

            renderDettaglioIngredienti();

            const stepsList = document.getElementById('detail-steps-list');
            stepsList.innerHTML = '';
            ricetta.steps.forEach((step, idx) => {
                const item = document.createElement('div');
                item.className = "flex gap-3 items-start";
                item.innerHTML = `
                    <div class="w-6 h-6 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center font-bold text-xs shrink-0 mt-0.5">${idx + 1}</div>
                    <p class="text-gray-600 text-xs leading-relaxed flex-1">${step}</p>
                `;
                stepsList.appendChild(item);
            });
            
            if(window.lucide) lucide.createIcons();
            updateFloatingButtonVisibility();
        }

        function closeRecipeDetail() {
            document.getElementById('detail-overlay').classList.add('hidden');
            idRicettaAttiva = null;
            updateFloatingButtonVisibility();
        }

        function renderDettaglioIngredienti() {
            const ul = document.getElementById('detail-ingredients-list');
            ul.innerHTML = '';
            ingredientiModificatiConvertitore.forEach(ing => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-center py-1 text-xs first:pt-0 last:pb-0";
                li.innerHTML = `
                    <span class="text-gray-600 font-medium">${ing.nome}</span>
                    <span class="text-gray-900 font-bold bg-white border border-gray-100 px-2 py-0.5 rounded-md text-[11px]">${ing.qta}</span>
                `;
                ul.appendChild(li);
            });
        }

        function calcolaProporzioni() {
            const idx = parseInt(document.getElementById('calc-ingrediente').value);
            const nuovoValore = parseFloat(document.getElementById('calc-valore').value);
            if (isNaN(nuovoValore) || nuovoValore <= 0) return alert("Inserisci una quantità valida.");

            const ricettaOriginale = databaseRicette.find(r => r.id === idRicettaAttiva);
            const ingredienteGuidaOriginale = ricettaOriginale.ingredients[idx];
            if (ingredienteGuidaOriginale.qta === 0) return alert("Quantità originale invalida.");

            const fattoreDiScala = nuovoValore / ingredienteGuidaOriginale.qta;
            ingredientiModificatiConvertitore = ricettaOriginale.ingredients.map(ing => ({
                nome: ing.nome,
                qta: Math.round((ing.qta * fattoreDiScala) * 100) / 100
            }));
            renderDettaglioIngredienti();
        }

        function resetDettaglioIngredienti() {
            const ricetta = databaseRicette.find(r => r.id === idRicettaAttiva);
            if (!ricetta) return;
            ingredientiModificatiConvertitore = JSON.parse(JSON.stringify(ricetta.ingredients));
            document.getElementById('calc-valore').value = '';
            renderDettaglioIngredienti();
        }

        function getFilteredRecipes() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const maxTime = document.getElementById('filter-time').value;

            return databaseRicette.filter(ricetta => {
                if (maxTime && ricetta.time > parseInt(maxTime)) return false;
                if (filtroCategoriaAttivo && (ricetta.category || '').toLowerCase() !== filtroCategoriaAttivo) return false;
                if (query) {
                    const matchTitolo = ricetta.title.toLowerCase().includes(query);
                    const matchIngredienti = ricetta.ingredients.some(ing => ing.nome.toLowerCase().includes(query));
                    return matchTitolo || matchIngredienti;
                }
                return true;
            });
        }

        function filterRecipes() {
            renderRecipesList(getFilteredRecipes());
        }

        // APERTURA IN MODALITÀ "CREAZIONE"
        function openCreateModal() {
            document.getElementById('form-recipe-id').value = ''; 
            document.getElementById('modal-title-text').textContent = "Nuova Ricetta";
            resetForm();
            document.getElementById('recipe-modal').classList.remove('hidden');
            updateFloatingButtonVisibility();
        }

        // APERTURA IN MODALITÀ "MODIFICA" (Carica i dati correnti)
        function openEditModal() {
            const ricetta = databaseRicette.find(r => r.id === idRicettaAttiva);
            if (!ricetta) return;

            document.getElementById('form-recipe-id').value = ricetta.id;
            document.getElementById('modal-title-text').textContent = "Modifica Ricetta";

            document.getElementById('form-title').value = ricetta.title;
            document.getElementById('form-category').value = ricetta.category || 'primo';
            document.getElementById('form-time').value = ricetta.time;
            document.getElementById('form-image').value = ricetta.image || '';

            // Carica gli ingredienti esistenti
            const ingContainer = document.getElementById('form-ingredients-container');
            ingContainer.innerHTML = '';
            ricetta.ingredients.forEach(ing => {
                addIngredientRowWithValue(ing.nome, ing.qta);
            });

            // Carica i passaggi esistenti
            const stepContainer = document.getElementById('form-steps-container');
            stepContainer.innerHTML = '';
            ricetta.steps.forEach(step => {
                addStepRowWithValue(step);
            });

            document.getElementById('recipe-modal').classList.remove('hidden');
            updateFloatingButtonVisibility();
        }

        function closeModal() {
            document.getElementById('recipe-modal').classList.add('hidden');
            resetForm();
            updateFloatingButtonVisibility();
        }

        function resetForm() {
            document.getElementById('recipe-form').reset();
            document.getElementById('form-ingredients-container').innerHTML = '';
            document.getElementById('form-steps-container').innerHTML = '';
            addIngredientRow();
            addIngredientRow();
            addStepRow();
        }

        function addIngredientRow() { addIngredientRowWithValue('', ''); }
        
        function addIngredientRowWithValue(nome, qta) {
            const container = document.getElementById('form-ingredients-container');
            const row = document.createElement('div');
            row.className = "flex gap-2 items-center ing-row";
            row.innerHTML = `
                <input type="text" value="${nome}" placeholder="Ingredienti (es. Riso in g)" required class="w-full px-3 py-2 border border-gray-200 rounded-xl focus:outline-none text-xs ing-name">
                <input type="number" step="any" value="${qta}" placeholder="Q.tà" required class="w-20 px-2 py-2 border border-gray-200 rounded-xl focus:outline-none text-xs text-center ing-qta">
                <button type="button" onclick="this.parentElement.remove()" class="text-gray-400 p-1"><i data-lucide="trash" class="w-4 h-4"></i></button>
            `;
            container.appendChild(row);
            if(window.lucide) lucide.createIcons();
        }

        function addStepRow() { addStepRowWithValue(''); }

        function addStepRowWithValue(testo) {
            const container = document.getElementById('form-steps-container');
            const row = document.createElement('div');
            row.className = "flex gap-2 items-start step-row";
            row.innerHTML = `
                <textarea rows="2" placeholder="Descrivi il passaggio..." required class="w-full px-3 py-2 border border-gray-200 rounded-xl focus:outline-none text-xs resize-none step-text">${testo}</textarea>
                <button type="button" onclick="this.parentElement.remove()" class="text-gray-400 p-1 mt-1"><i data-lucide="trash" class="w-4 h-4"></i></button>
            `;
            container.appendChild(row);
            if(window.lucide) lucide.createIcons();
        }

        function saveRecipe(event) {
            event.preventDefault();

            const ingRows = document.querySelectorAll('.ing-row');
            const ingredients = [];
            ingRows.forEach(row => {
                const nameInput = row.querySelector('.ing-name');
                const qtaInput = row.querySelector('.ing-qta');
                if (nameInput && nameInput.value.trim()) {
                    ingredients.push({ nome: nameInput.value.trim(), qta: parseFloat(qtaInput.value) || 0 });
                }
            });

            const stepRows = document.querySelectorAll('.step-row');
            const steps = [];
            stepRows.forEach(row => {
                const txtArea = row.querySelector('.step-text');
                if (txtArea && txtArea.value.trim()) steps.push(txtArea.value.trim());
            });

            const editId = document.getElementById('form-recipe-id').value;

            if (editId) {
                // MODIFICA: Aggiorna la ricetta esistente nello stesso posto
                const index = databaseRicette.findIndex(r => r.id === editId);
                if (index !== -1) {
                    databaseRicette[index] = {
                        id: editId,
                        title: document.getElementById('form-title').value.trim(),
                        category: document.getElementById('form-category').value,
                        time: parseInt(document.getElementById('form-time').value) || 0,
                        image: document.getElementById('form-image').value.trim(),
                        ingredients: ingredients,
                        steps: steps
                    };
                }
                idRicettaAttiva = editId;
            } else {
                // CREAZIONE: Aggiungi in cima alla lista
                const nuovaRicetta = {
                    id: 'recipe-' + Date.now(),
                    title: document.getElementById('form-title').value.trim(),
                    category: document.getElementById('form-category').value,
                    time: parseInt(document.getElementById('form-time').value) || 0,
                    image: document.getElementById('form-image').value.trim(),
                    ingredients: ingredients,
                    steps: steps
                };
                databaseRicette.unshift(nuovaRicetta);
                idRicettaAttiva = nuovaRicetta.id;
            }

            salvaSuFileLocale();
            closeModal();
            renderRecipesList(getFilteredRecipes());
            openRecipeDetail(idRicettaAttiva); // Riapre il dettaglio aggiornato
        }

        function deleteRecipe() {
            if (!idRicettaAttiva) return;
            if (confirm("Vuoi eliminare definitivamente questa ricetta?")) {
                databaseRicette = databaseRicette.filter(r => r.id !== idRicettaAttiva);
                salvaSuFileLocale();
                closeRecipeDetail();
                renderRecipesList(getFilteredRecipes());
            }
        }

        function exportData() {
            if (databaseRicette.length === 0) return alert("Nessuna ricetta da esportare.");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(databaseRicette, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "gourmetkeep_backup.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function triggerImport() { document.getElementById('import-file').click(); }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedJSON = JSON.parse(e.target.result);
                    if (Array.isArray(importedJSON)) {
                        if (confirm(`Rilevate ${importedJSON.length} ricette. Sovrascrivere il database attuale?`)) {
                            databaseRicette = importedJSON;
                            salvaSuFileLocale();
                            closeRecipeDetail();
                            switchTab('home');
                            renderRecipesList(databaseRicette);
                            alert("Dati importati correttamente!");
                        }
                    }
                } catch (err) { alert("Errore di formato JSON."); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function copiaCodiceSorgente() {
            const interoCodice = document.documentElement.outerHTML;
            navigator.clipboard.writeText(interoCodice).then(() => {
                const btnText = document.getElementById('btn-copy-text');
                btnText.textContent = "Copiato!";
                setTimeout(() => { btnText.textContent = "Copia"; }, 2000);
            });
        }

        window.onload = initApp;
    </script>
</body>
</html>
